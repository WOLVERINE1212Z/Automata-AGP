<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AGP - Visor de Planos Técnicos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --agp-primary: #00A2D7;
      --agp-secondary: #3FBBD3;
      --agp-accent: #8FC5CF;
      --agp-gris: #4C4C4C;
      --agp-bg: #E5E5E5;
      --agp-white: #FFFFFF;
      --agp-text: #333333;
      --agp-text-light: #666666;
      --agp-border: #D0D0D0;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--agp-bg);
      color: var(--agp-text);
      min-height: 100vh;
    }
    
    /* Header  */ 
    .header {
      background: linear-gradient(135deg, var(--agp-primary) 0%, var(--agp-secondary) 100%);
      color: white;
      padding: 20px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 20px rgba(0, 162, 215, 0.3);
    }
    
    .header h1 {
      font-size: 22px;
      font-weight: 700;
    }
    
    .header-actions {
      display: flex;
      gap: 10px;
    }
    
    .btn {
      background: white;
      color: var(--agp-primary);
      border: none;
      padding: 10px 18px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      font-size: 14px;
    }
    
    .btn:hover {
      background: #f0f0f0;
    }
    
    /* Buscador y Filtros */
    .search-section {
      background: white;
      padding: 15px 30px;
      border-bottom: 1px solid var(--agp-border);
    }
    
    .search-row {
      display: flex;
      gap: 15px;
      align-items: center;
      margin-bottom: 12px;
    }
    
    .search-input {
      flex: 1;
      padding: 10px 15px;
      border: 2px solid var(--agp-border);
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
    }
    
    .search-input:focus {
      outline: none;
      border-color: var(--agp-primary);
    }
    
    .filtros {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    
    .filtro-btn {
      padding: 6px 14px;
      border: 1px solid var(--agp-border);
      background: white;
      border-radius: 20px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .filtro-btn:hover {
      border-color: var(--agp-primary);
      color: var(--agp-primary);
    }
    
    .filtro-btn.active {
      background: var(--agp-primary);
      color: white;
      border-color: var(--agp-primary);
    }
    
    .stats {
      color: var(--agp-text-light);
      font-size: 13px;
    }
    
    /* Contenido */
    .main-content {
      display: flex;
      height: calc(100vh - 180px);
    }
    
    /* Panel izquierdo - Lista de archivos */
    .lista-archivos {
      width: 420px;
      background: white;
      border-right: 1px solid var(--agp-border);
      overflow-y: auto;
    }
    
    .lista-header {
      padding: 12px 20px;
      background: #f8f8f8;
      font-weight: 600;
      font-size: 13px;
      color: var(--agp-text-light);
      border-bottom: 1px solid var(--agp-border);
      display: flex;
      justify-content: space-between;
    }
    .carpeta-grupo {
      border-bottom: 1px solid var(--agp-border);
    }

    .carpeta-titulo {
      padding: 10px 20px;
      background: #f3f7f9;
      font-size: 12px;
      font-weight: 700;
      color: var(--agp-gris);
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .carpeta-contador {
      font-weight: 500;
      color: var(--agp-text-light);
      margin-left: 6px;
    }

    .archivos-en-carpeta {
      background: white;
    }
    
    .archivo-item {
      padding: 12px 20px;
      cursor: pointer;
      border-bottom: 1px solid #f0f0f0;
      transition: background 0.15s;
    }
    
    .archivo-item:hover {
      background: #f5f5f5;
    }
    
    .archivo-item.selected {
      background: rgba(0, 162, 215, 0.1);
      border-left: 3px solid var(--agp-primary);
    }
    
    .archivo-nombre {
      font-weight: 500;
      font-size: 14px;
      margin-bottom: 4px;
      color: var(--agp-text);
    }
    
    .archivo-carpeta {
      font-size: 12px;
      color: var(--agp-text-light);
      margin-bottom: 6px;
    }
    
    .archivo-tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    
    .tag {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 4px;
      background: var(--agp-bg);
      color: var(--agp-text-light);
    }
    
    .tag.offset { background: #e3f2fd; color: #1565c0; }
    .tag.bn { background: #e8f5e9; color: #2e7d32; }
    .tag.datos { background: #fff3e0; color: #ef6c00; }
    
    /* Panel derecho - Detalles */
    .detalles {
      flex: 1;
      padding: 25px;
      overflow-y: auto;
      background: #fafafa;
    }
    
    .detalles-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--agp-text-light);
    }
    
    .detalles-empty-icon {
      font-size: 64px;
      opacity: 0.3;
      margin-bottom: 15px;
    }
    
    .detalles-header {
      background: white;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    
    .detalles-header h2 {
      font-size: 20px;
      color: var(--agp-gris);
      margin-bottom: 8px;
    }
    
    .detalles-header .ruta {
      color: var(--agp-text-light);
      font-size: 13px;
    }
    
    .detalles-header .stats {
      margin-top: 10px;
    }
    
    /* Tablas */
    .tablas-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 15px;
    }
    
    .tabla-card {
      background: white;
      border-radius: 10px;
      padding: 18px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      border: 1px solid var(--agp-border);
    }
    
    .tabla-card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      padding-bottom: 10px;
      border-bottom: 2px solid var(--agp-primary);
    }
    
    .tabla-numero {
      background: var(--agp-primary);
      color: white;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 12px;
    }
    
    .tabla-bloque {
      color: var(--agp-text-light);
      font-size: 12px;
    }
    
    .campo-item {
      display: flex;
      justify-content: space-between;
      padding: 8px 10px;
      background: var(--agp-bg);
      border-radius: 6px;
      margin-bottom: 6px;
    }
    
    .campo-nombre {
      font-weight: 600;
      font-size: 13px;
      color: var(--agp-gris);
    }
    
    .campo-valor {
      color: var(--agp-primary);
      font-weight: 500;
      font-size: 13px;
    }
    
    /* Loading */
    .loading {
      position: fixed;
      inset: 0;
      background: rgba(229, 229, 229, 0.95);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    
    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid var(--agp-border);
      border-top-color: var(--agp-primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <!-- Loading -->
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p style="margin-top: 15px; color: #666;">Cargando datos...</p>
  </div>
  
  <!-- Header -->
  <header class="header">
    <h1>📋 Pieza 090 - Visor de Planos Técnicos</h1>
    <div class="header-actions">
      <button class="btn" onclick="descargarExcel()">📥 Descargar Excel</button>
    </div>
  </header>
  
  <!-- Buscador y Filtros -->
  <div class="search-section">
    <div class="search-row">
      <input type="text" class="search-input" id="buscador" placeholder="Buscar por archivo 090, carpeta, OFFSET, BN+D..." oninput="filtrarDatos()">
      <span class="stats" id="stats">Cargando...</span>
    </div>
    <div class="filtros">
      <button class="filtro-btn active" onclick="setFiltro('todos', this)">Todos</button>
      <button class="filtro-btn" onclick="setFiltro('con_datos', this)">✓ Con datos</button>
      <button class="filtro-btn" onclick="setFiltro('252', this)">252</button>
      <button class="filtro-btn" onclick="setFiltro('275', this)">275</button>
      <button class="filtro-btn" onclick="setFiltro('401', this)">401</button>
      <button class="filtro-btn" onclick="setFiltro('477', this)">477</button>
      <button class="filtro-btn" onclick="setFiltro('514', this)">514</button>
    </div>
  </div>
  
  <!-- Contenido -->
  <div class="main-content">
    <!-- Lista de archivos -->
    <aside class="lista-archivos" id="lista-archivos">
      <div class="lista-header">
        <span>Archivos</span>
        <span id="contador">0</span>
      </div>
      <div id="archivos-lista"></div>
    </aside>
    
    <!-- Detalles -->
    <main class="detalles" id="detalles">
      <div class="detalles-empty">
        <div class="detalles-empty-icon">📄</div>
        <h3>Selecciona un archivo</h3>
        <p>Haz clic en un archivo para ver sus especificaciones técnicas</p>
      </div>
    </main>
  </div>

  <script>
    let datosGlobales = null;
    let archivosMostrados = [];
    let filtroActual = 'todos';
    
    async function cargarDatos() {
      try {
        const response = await fetch('output/TOYOTA_datos.json');
        datosGlobales = await response.json();
        
        archivosMostrados = [...datosGlobales.planos];
        renderizarLista();

        document.getElementById('stats').textContent = 
          `${datosGlobales.metadata.total} archivos 090 | ${datosGlobales.metadata.exitosos} con datos`;
        
        document.getElementById('loading').style.display = 'none';
      } catch (error) {
        document.getElementById('loading').innerHTML = `<p style="color: red;">Error: ${error.message}</p>`;
      }
    }
    
    function getTags(plano) {
      const tags = [];

      if (plano.resumen && plano.resumen.length > 0) {
        plano.resumen.slice(0, 3).forEach(item => {
          let tipo = 'datos';
          if (item.startsWith('OFFSET')) tipo = 'offset';
          if (item.startsWith('BN')) tipo = 'bn';
          tags.push({ tipo, valor: item });
        });
      }

      return tags;
    }
    
    function renderizarLista() {
  const container = document.getElementById('archivos-lista');
  document.getElementById('contador').textContent = archivosMostrados.length;

  const grupos = {};

  archivosMostrados.forEach((plano, idx) => {
    const carpeta = plano.carpeta && plano.carpeta.trim() !== '' ? plano.carpeta : 'Raíz';
    if (!grupos[carpeta]) grupos[carpeta] = [];
    grupos[carpeta].push({ plano, idx });
  });

  let html = '';

  Object.keys(grupos).sort().forEach(carpeta => {
    html += `
      <div class="carpeta-grupo">
        <div class="carpeta-titulo">
          📁 ${carpeta}
          <span class="carpeta-contador">(${grupos[carpeta].length})</span>
        </div>
        <div class="archivos-en-carpeta">
    `;

    grupos[carpeta].forEach(({ plano, idx }) => {
      const tags = getTags(plano);
      const tieneDatos = plano.tablas && plano.tablas.length > 0;

      html += `
        <div class="archivo-item" onclick="seleccionarArchivo(${idx})" data-idx="${idx}">
          <div class="archivo-nombre">${plano.archivo}</div>
          <div class="archivo-carpeta">Pieza: ${plano.pieza || '090'}</div>
          <div class="archivo-tags">
            ${tags.map(t => `<span class="tag ${t.tipo}">${t.valor}</span>`).join('')}
            ${!tieneDatos ? '<span class="tag">Sin datos</span>' : ''}
          </div>
        </div>
      `;
    });

    html += `
        </div>
      </div>
    `;
  });

  container.innerHTML = html;
}
    
    function seleccionarArchivo(idx) {
      const plano = archivosMostrados[idx];
      
      // Marcar seleccionado
      document.querySelectorAll('.archivo-item').forEach(el => el.classList.remove('selected'));
      document.querySelector(`[data-idx="${idx}"]`).classList.add('selected');
      
      renderizarDetalles(plano);
    }
    
    function renderizarDetalles(plano) {
      const container = document.getElementById('detalles');
      
      if (!plano || !plano.tablas || plano.tablas.length === 0) {
        container.innerHTML = `
          <div class="detalles-empty">
            <div class="detalles-empty-icon">📄</div>
            <h3>${plano?.archivo || 'Archivo'}</h3>
            <p>${plano?.error || 'No hay datos técnicos disponibles'}</p>
          </div>
        `;
        return;
      }
      
      let html = `
        <div class="detalles-header">
          <h2>${plano.archivo}</h2>
          <p class="ruta">📁 ${plano.carpeta || 'Raíz'}</p>
          <p class="stats">Pieza ${plano.pieza || '090'} | ${plano.tablas.length} tabla(s) técnica(s)</p>
        </div>
        <div class="tablas-grid">
      `;
      
      plano.tablas.forEach((tabla, i) => {
        const campos = Object.entries(tabla.atributos || {});
        
        html += `
          <div class="tabla-card">
            <div class="tabla-card-header">
              <span class="tabla-numero">${i + 1}</span>
              <span class="tabla-bloque">${tabla.bloque || 'Tabla'}</span>
            </div>
            <div>
              ${campos.map(([campo, valor]) => `
                <div class="campo-item">
                  <span class="campo-nombre">${campo}</span>
                  <span class="campo-valor">${valor}</span>
                </div>
              `).join('')}
            </div>
          </div>
        `;
      });
      
      html += '</div>';
      container.innerHTML = html;
    }
    
    function setFiltro(tipo, btn) {
      // Actualizar botones
      document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      
      filtroActual = tipo;
      filtrarDatos();
    }
    
    function filtrarDatos() {
      const query = document.getElementById('buscador').value.toLowerCase();

      archivosMostrados = datosGlobales.planos.filter(plano => {
        if (filtroActual === 'con_datos') {
          if (!plano.tablas || plano.tablas.length === 0) return false;
        } else if (filtroActual === 'sin_datos') {
          if (plano.tablas && plano.tablas.length > 0) return false;
        } else if (filtroActual === 'pieza_090') {
          if (plano.pieza !== '090') return false;
        }

        if (query) {
          const texto = JSON.stringify(plano).toLowerCase();
          return texto.includes(query);
        }

        return true;
      });

      renderizarLista();
    }
    
    function descargarExcel() {
      window.open('output/TOYOTA_planos.xlsx', '_blank');
    }
    
    window.onload = cargarDatos;
  </script>
</body>
</html>
